
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>User Information Form</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>

    <h1>User Information Form</h1>

    <form>

      <label>Full Name</label><br>
      <input type="text" id="fullname"><br><br>

      <label>Email Address</label><br>
      <input type="text" id="email"><br><br>

      <label>Phone Number (Hidden for Privacy)</label><br>
      <input type="password" id="phone"><br><br>

      <label>Select Gender</label><br>
      <input type="radio" id="female" name="gender" value="Female"> Female<br>
      <input type="radio" id="male" name="gender" value="Male"> Male<br><br>

      <label>Preferred City</label><br>
      <input type="checkbox" id="city1" value="Kolkata"> Kolkata<br>
      <input type="checkbox" id="city2" value="Bengaluru"> Bengaluru<br><br>

      <input type="submit" value="Register">

    </form>

  </body>
</html>
