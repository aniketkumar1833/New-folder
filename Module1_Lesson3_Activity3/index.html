<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Super Game Zone</title>
</head>

<body>

  <center>

    <h1>🎮 Super Game Zone</h1>

    <h2>Enjoy the game right here!</h2>

    <p>
      Test your skills, avoid obstacles, and see how far you can go without leaving this webpage.
    </p>

    <iframe
      src="https://scratch.mit.edu/projects/60917032/embed"
      allowtransparency="true"
      width="500"
      height="400"
      frameborder="0"
      scrolling="no"
      allowfullscreen>
    </iframe>

    <h2>Game On!</h2>

    <p>
      Using the iframe tag, we can embed a Scratch game directly into an HTML page and play it without opening another website.
    </p>

  </center>

</body>

</html>
